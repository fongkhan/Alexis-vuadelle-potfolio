name: Deploy to O2Switch via SSH

on:
  push:
    branches:
      - main  # Set this to the branch you want to trigger the deployment

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Execute Deployment Commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.O2SWITCH_HOST }}
          username: ${{ secrets.O2SWITCH_USER }}
          # password: ${{ secrets.O2SWITCH_PASSWORD }}
          # Alternatively use SSH keys:
          key: ${{ secrets.O2SWITCH_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            echo "Navigating to project root..."
            cd /home/fongkhan/alexis-vuadelle
            
            echo "Pulling latest code from GitHub main branch..."
            git pull origin main

            echo "================================="
            echo "1. Building the Frontend (Astro)"
            echo "================================="
            # Activate frontend venv and build
            source /home/fongkhan/nodevenv/alexis-vuadelle/frontend/24/bin/activate
            node -v
            npm install
            npm run build
            # 'touch tmp/restart.txt' is the command Phusion Passenger (cPanel) looks for to restart the Node app
            mkdir -p tmp
            touch tmp/restart.txt 
            deactivate

            echo "================================="
            echo "2. Building the CMS (Next.js)"
            echo "================================="
            # Activate cms venv and build
            source /home/fongkhan/nodevenv/alexis-vuadelle/cms/24/bin/activate
            node -v
            npm install
            npm run build
            mkdir -p tmp
            touch tmp/restart.txt 
            deactivate

            echo "Deployment Completed Successfully! Both Phusion Passenger apps dynamically restarted."
